name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build embedded frontend assets
        run: ./tools/sync_webui_dist.sh

      - name: Run Go tests
        run: go test ./...

      - name: Run frontend tests
        working-directory: webui
        run: bun run test

  smoke:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output: dist/translategemma-ui
          - os: macos-latest
            output: dist/translategemma-ui
          - os: windows-latest
            output: dist/translategemma-ui.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail
          ./tools/sync_webui_dist.sh
          source ./tools/lib_release.sh
          mkdir -p dist
          go build -trimpath -ldflags "$(release_ldflags)" -o "${{ matrix.output }}" ./cmd/translategemma-ui

      - name: Check --help
        shell: bash
        run: "./${{ matrix.output }} --help"

      - name: Check --version
        shell: bash
        run: "./${{ matrix.output }} --version"

  release:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git switch -C main origin/main
          version="${GITHUB_REF_NAME}"
          checksum_file="dist/translategemma-ui_${version#v}_checksums.txt"
          ./tools/render_homebrew_formula.sh "$version" "$checksum_file" Formula/translategemma-ui.rb
          if git diff --quiet -- Formula/translategemma-ui.rb; then
            echo "Formula is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/translategemma-ui.rb
          git commit -m "chore: update Homebrew formula for ${version}"
          git push origin HEAD:main

  desktop-macos:
    needs: release
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build embedded frontend assets
        run: ./tools/sync_webui_dist.sh

      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Prepare App Store Connect API key
        if: ${{ env.APPLE_API_KEY != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_KEY_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          key_dir="$RUNNER_TEMP/apple-api"
          mkdir -p "$key_dir"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY}.p8"
          APPLE_API_KEY_BASE64="$APPLE_API_KEY_BASE64" KEY_PATH="$key_path" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["KEY_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_API_KEY_BASE64"])
          )
          PY
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build desktop bundle
        working-directory: desktop
        shell: bash
        env:
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          if [[ -n "${APPLE_CERTIFICATE}" && -n "${APPLE_CERTIFICATE_PASSWORD}" && -n "${APPLE_SIGNING_IDENTITY_SECRET}" ]]; then
            export APPLE_SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY_SECRET}"
            echo "Building macOS desktop bundle with Developer ID signing"
          else
            export APPLE_SIGNING_IDENTITY="-"
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_PATH || true
            echo "Building macOS desktop bundle with ad-hoc signing (no Apple secrets configured)"
          fi

          bun run build

      - name: Package desktop artifacts for release upload
        id: package_desktop
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64) arch_tag="arm64" ;;
            x86_64) arch_tag="amd64" ;;
            *) arch_tag="$(uname -m)" ;;
          esac
          dmg_src="$(find desktop/src-tauri/target/release/bundle/dmg -maxdepth 1 -name 'TranslateGemmaUI_*.dmg' -print -quit)"
          if [[ -z "${dmg_src}" ]]; then
            echo "desktop dmg not found" >&2
            exit 1
          fi
          dmg_path="desktop/src-tauri/target/release/bundle/dmg/TranslateGemmaUI_${GITHUB_REF_NAME}_macos_${arch_tag}.dmg"
          cp "$dmg_src" "$dmg_path"
          shasum -a 256 \
            "$dmg_path" \
            > desktop/src-tauri/target/release/bundle/desktop-macos-checksums.txt
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Upload desktop artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package_desktop.outputs.dmg_path }}
            desktop/src-tauri/target/release/bundle/desktop-macos-checksums.txt

  desktop-linux:
    needs: release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libxdo-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build embedded frontend assets
        run: ./tools/sync_webui_dist.sh

      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Build desktop bundle
        working-directory: desktop
        run: bun run build

      - name: Package desktop artifacts for release upload
        id: package_desktop
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            aarch64|arm64) arch_tag="arm64" ;;
            x86_64) arch_tag="amd64" ;;
            *) arch_tag="$(uname -m)" ;;
          esac
          assets_dir="desktop/src-tauri/target/release/bundle/release-assets"
          mkdir -p "$assets_dir"

          appimage_src="$(find desktop/src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' -print -quit)"
          deb_src="$(find desktop/src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"

          if [[ -z "${appimage_src}" || -z "${deb_src}" ]]; then
            echo "expected Linux desktop artifacts not found" >&2
            exit 1
          fi

          appimage_path="${assets_dir}/TranslateGemmaUI_${GITHUB_REF_NAME}_linux_${arch_tag}.AppImage"
          deb_path="${assets_dir}/TranslateGemmaUI_${GITHUB_REF_NAME}_linux_${arch_tag}.deb"
          cp "$appimage_src" "$appimage_path"
          cp "$deb_src" "$deb_path"
          shasum -a 256 \
            "$appimage_path" \
            "$deb_path" \
            > "${assets_dir}/desktop-linux-checksums.txt"

      - name: Upload desktop artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/release-assets/TranslateGemmaUI_${{ github.ref_name }}_linux_*.AppImage
            desktop/src-tauri/target/release/bundle/release-assets/TranslateGemmaUI_${{ github.ref_name }}_linux_*.deb
            desktop/src-tauri/target/release/bundle/release-assets/desktop-linux-checksums.txt

  desktop-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build embedded frontend assets
        shell: bash
        run: ./tools/sync_webui_dist.sh

      - name: Install desktop dependencies
        working-directory: desktop
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build desktop bundle
        working-directory: desktop
        shell: bash
        run: bun run build

      - name: Package desktop artifacts for release upload
        shell: pwsh
        run: |
          $assetsDir = "desktop/src-tauri/target/release/bundle/release-assets"
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          $archTag = if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") { "arm64" } else { "amd64" }

          $msiSource = Get-ChildItem "desktop/src-tauri/target/release/bundle/msi" -Filter *.msi -Recurse | Select-Object -First 1
          $exeSource = Get-ChildItem "desktop/src-tauri/target/release/bundle/nsis" -Filter *.exe -Recurse | Select-Object -First 1

          if (-not $msiSource -or -not $exeSource) {
            throw "expected Windows desktop artifacts not found"
          }

          $msiPath = Join-Path $assetsDir "TranslateGemmaUI_${env:GITHUB_REF_NAME}_windows_${archTag}.msi"
          $exePath = Join-Path $assetsDir "TranslateGemmaUI_${env:GITHUB_REF_NAME}_windows_${archTag}.exe"
          Copy-Item $msiSource.FullName $msiPath -Force
          Copy-Item $exeSource.FullName $exePath -Force

          $hashLines = @()
          foreach ($path in @($msiPath, $exePath)) {
            $hash = (Get-FileHash -Algorithm SHA256 $path).Hash.ToLowerInvariant()
            $name = Split-Path $path -Leaf
            $hashLines += "$hash  $name"
          }
          Set-Content -Path (Join-Path $assetsDir "desktop-windows-checksums.txt") -Value $hashLines

      - name: Upload desktop artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/release-assets/TranslateGemmaUI_${{ github.ref_name }}_windows_*.msi
            desktop/src-tauri/target/release/bundle/release-assets/TranslateGemmaUI_${{ github.ref_name }}_windows_*.exe
            desktop/src-tauri/target/release/bundle/release-assets/desktop-windows-checksums.txt
